version: "3.9"

# ─────────────────────────────────────────────
# RIPS Guard — Stack completo (desarrollo local)
# Uso: docker compose up --build
# ─────────────────────────────────────────────

services:

  # ── API FastAPI ──────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripsguard-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENV=development
    volumes:
      # Hot-reload en desarrollo (montar código fuente)
      - ./rips_parser.py:/app/rips_parser.py
      - ./validation_engine.py:/app/validation_engine.py
      - ./ai_corrector.py:/app/ai_corrector.py
      - ./worker.py:/app/worker.py
    command: uvicorn worker:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Billing API (Stripe) ─────────────────────
  billing:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ripsguard-billing
    ports:
      - "8001:8001"
    env_file:
      - .env
    command: uvicorn stripe_integration:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  # ── Stripe CLI (webhook local en desarrollo) ──
  # Requiere: docker pull stripe/stripe-cli
  # stripe-cli:
  #   image: stripe/stripe-cli
  #   command: listen --forward-to http://billing:8001/billing/webhook
  #   env_file:
  #     - .env
  #   depends_on:
  #     - billing

networks:
  default:
    name: ripsguard-network
